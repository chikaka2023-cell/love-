<<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Heart</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.container{
    position:relative;
    width:500px;
    height:500px;
}

.love{
    position:absolute;
    color:#ff9ecf;
    font-size:20px;
    text-shadow:0 0 10px #ff69b4;
    animation:float 4s infinite linear;
}

@keyframes float{
    0%{
        opacity:0;
        transform:translateY(20px) scale(0.5);
    }
    50%{
        opacity:1;
    }
    100%{
        opacity:0;
        transform:translateY(-20px) scale(1);
    }
}
</style>
</head>

<body>

<div id="home">
    <h1>❤️ Untuk Kamu ❤️</h1>
    <button onclick="showHeart()">I LOVE </button>
</div>

<div class="container" id="heart" style="display:none;"></div>

<style>
#home{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100vh;
    background:#000;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#home h1{
    color:#ff0000;
    font-size:50px;
    margin-bottom:30px;
    text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff3333;
}

#home button{
    padding:15px 40px;
    font-size:22px;
    font-weight:bold;
    border:none;
    border-radius:50px;
    cursor:pointer;
    color:white;
    background:#ff0000;
    box-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff3333,
        0 0 80px #ff6666;
    transition:.3s;
}

#home button:hover{
    transform:scale(1.1);
}
</style>

<script>

function showHeart(){

    document.getElementById("home").style.display="none";
    document.getElementById("heart").style.display="block";

    const container = document.getElementById("heart");

    for(let t=0; t<360; t+=6){

        let rad = t * Math.PI / 180;

        let x = 16 * Math.pow(Math.sin(rad),3);

        let y =
        13*Math.cos(rad)
        -5*Math.cos(2*rad)
        -2*Math.cos(3*rad)
        -Math.cos(4*rad);

        let text = document.createElement("div");

        text.className = "love";
        text.innerText = " I LOVE YOU ";

        text.style.left = (x * 18 + 230) + "px";
        text.style.top = (-y * 18 + 230) + "px";

        text.style.animationDelay = Math.random()*3 + "s";

        container.appendChild(text);
    }
}

</script>

</body>
