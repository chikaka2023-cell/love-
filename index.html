<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Heart</title>

<style>
body{
    margin:0;
    background:#000;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.container{
    position:relative;
    width:500px;
    height:500px;
}

.love{
    position:absolute;
    color:#ff1a1a;
    font-size:20px;
    font-weight:bold;
    text-shadow:
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000,
        0 0 80px #ff0000,
        0 0 120px #ff3333;
    animation:float 4s infinite linear;
}

@keyframes float{
    0%{
        opacity:0;
        transform:translateY(20px) scale(0.5);
    }
    50%{
        opacity:1;
    }
    100%{
        opacity:0;
        transform:translateY(-20px) scale(1);
    }
}
</style>
</head>

<body>

<div id="startPage">
    <h1>❤️ Untuk Kamu ❤️</h1>
    <button onclick="startLove()">I LOVE ❤️</button>
</div>

<div class="container" id="heart" style="display:none;"></div>

<style>
#startPage{
    position:absolute;
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ff9ecf,#ff69b4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

#startPage h1{
    color:white;
    margin-bottom:30px;
    font-size:40px;
}

#startPage button{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff1493;
    font-size:22px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 20px rgba(255,255,255,.7);
    transition:.3s;
}

#startPage button:hover{
    transform:scale(1.1);
}
</style>

<script>

function startLove(){
    document.getElementById("startPage").style.display="none";
    document.getElementById("heart").style.display="block";

    const container = document.getElementById("heart");

    for(let t=0; t<360; t+=2){ /* lebih rapat */

        let rad = t * Math.PI / 180;

        let x = 16 * Math.pow(Math.sin(rad),3);

        let y =
        13*Math.cos(rad)
        -5*Math.cos(2*rad)
        -2*Math.cos(3*rad)
        -Math.cos(4*rad);

        let text = document.createElement("div");

        text.className = "love";

        const words = [
            "I LOVE YOU ❤️",
            "LOVE ❤️",
            "FOREVER ❤️",
            "MISS YOU ❤️",
            "I LOVE YOU ❤️"
        ];

       text.innerText = "❤️ I LOVE YOU ❤️";
        words[Math.floor(Math.random()*words.length)];

        text.style.left = (x * 15 + 230) + "px";
        text.style.top = (-y * 15 + 230) + "px";

        text.style.animationDelay =
        Math.random()*3 + "s";

        container.appendChild(text);
    }
}
</script>

</body>
